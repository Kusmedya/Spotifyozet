<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuş Medya Tasarım | Premium İstatistik</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: #0b0b0b; color: #ffffff; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        
        /* Premium Cam Efekti (Glassmorphism) */
        .glass-panel { background: rgba(24, 24, 24, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.05); border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        
        /* Giriş Ekranı */
        #login-ui { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; text-align: center; padding: 20px; }
        #login-ui h1 { font-size: 3rem; margin-bottom: 10px; font-weight: 800; background: -webkit-linear-gradient(#1DB954, #1ed760); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* Ana Kontrol Paneli */
        #dashboard { display: none; width: 100%; max-width: 900px; padding: 40px 20px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .header h2 { font-size: 1.8rem; font-weight: 800; }
        .logout-btn { background: #282828; color: white; padding: 8px 20px; border-radius: 20px; text-decoration: none; font-size: 0.9rem; transition: 0.3s; border: 1px solid #333; cursor: pointer;}
        .logout-btn:hover { background: #e22134; border-color: #e22134; }

        /* Filtre Sekmeleri */
        .controls { display: flex; flex-direction: column; gap: 20px; margin-bottom: 30px; }
        .tab-group { display: flex; gap: 10px; background: #121212; padding: 5px; border-radius: 12px; border: 1px solid #222; overflow-x: auto;}
        .tab { flex: 1; text-align: center; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: 600; color: #888; transition: 0.3s; font-size: 0.9rem; white-space: nowrap; }
        .tab:hover { color: #fff; }
        .tab.active { background: #1DB954; color: #000; box-shadow: 0 4px 15px rgba(29, 185, 84, 0.3); }

        /* İçerik Alanı */
        .content-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        .item-card { display: flex; align-items: center; padding: 15px; background: #181818; border-radius: 16px; transition: 0.3s; border: 1px solid transparent; }
        .item-card:hover { background: #222; border-color: #1DB954; transform: translateY(-2px); }
        .item-rank { font-size: 1.5rem; font-weight: 800; color: #333; width: 40px; text-align: center; }
        .item-info { flex: 1; margin-left: 15px; }
        .item-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 4px; color: #fff; }
        .item-sub { font-size: 0.85rem; color: #a0a0a0; text-transform: capitalize; }
        
        .loading { text-align: center; padding: 50px; color: #1DB954; font-weight: bold; font-size: 1.2rem; }
        
        .btn-main { background: #1DB954; color: #000; padding: 16px 40px; border-radius: 50px; font-weight: 800; cursor: pointer; border: none; font-size: 1.1rem; margin-top: 20px; transition: 0.3s; box-shadow: 0 10px 30px rgba(29, 185, 84, 0.4); }
        .btn-main:hover { transform: scale(1.05); background: #1ed760; }
    </style>
</head>
<body>

<div id="login-ui">
    <div class="glass-panel" style="padding: 50px; text-align: center;">
        <h1>Kuş Medya</h1>
        <p style="color: #a0a0a0; font-size: 1.1rem; margin-bottom: 10px;">Premium Müzik İstatistikleri</p>
        <button class="btn-main" onclick="authorize()">Sisteme Bağlan</button>
    </div>
</div>

<div id="dashboard">
    <div class="header">
        <h2>Analiz Paneli</h2>
        <button class="logout-btn" onclick="window.location.href=window.location.pathname">Çıkış Yap</button>
    </div>

    <div class="controls">
        <div class="tab-group" id="time-tabs">
            <div class="tab active" onclick="changeTime('short_term', this)">Son 1 Ay</div>
            <div class="tab" onclick="changeTime('medium_term', this)">Son 6 Ay</div>
            <div class="tab" onclick="changeTime('long_term', this)">Son 1 Yıl</div>
        </div>
        
        <div class="tab-group" id="type-tabs">
            <div class="tab active" onclick="changeType('tracks', this)">🎵 Şarkılar</div>
            <div class="tab" onclick="changeType('artists', this)">🎤 Sanatçılar</div>
            <div class="tab" onclick="changeType('genres', this)">🎸 Müzik Türleri</div>
        </div>
    </div>

    <div class="content-grid" id="results">
        </div>
</div>

<script>
    const CLIENT_ID = '1356e6584dcd4b21a0ec9d22175a035d';
    const REDIRECT_URI = window.location.origin + window.location.pathname;
    let accessToken = '';
    let currentTime = 'short_term'; // Başlangıç zamanı: 1 Ay
    let currentType = 'tracks'; // Başlangıç türü: Şarkılar

    // PKCE Şifreleme Kodları
    function generateRandomString(length) {
      let text = '';
      let possible = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
      for (let i = 0; i < length; i++) text += possible.charAt(Math.floor(Math.random() * possible.length));
      return text;
    }

    async function generateCodeChallenge(codeVerifier) {
      const data = new TextEncoder().encode(codeVerifier);
      const digest = await window.crypto.subtle.digest('SHA-256', data);
      return btoa(String.fromCharCode.apply(null, new Uint8Array(digest))).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
    }

    async function authorize() {
      const codeVerifier = generateRandomString(128);
      window.localStorage.setItem('code_verifier', codeVerifier);
      const codeChallenge = await generateCodeChallenge(codeVerifier);
      
      const args = new URLSearchParams({
        response_type: 'code',
        client_id: CLIENT_ID,
        // DİKKAT: Artık geçmişi değil, EN ÇOK dinlenenleri istiyoruz (user-top-read)
        scope: 'user-top-read', 
        redirect_uri: REDIRECT_URI,
        code_challenge_method: 'S256',
        code_challenge: codeChallenge
      });
      window.location = 'https://accounts.spotify.com/authorize?' + args;
    }

    async function getToken(code) {
      let codeVerifier = localStorage.getItem('code_verifier');
      const body = new URLSearchParams({
        grant_type: 'authorization_code',
        code: code,
        redirect_uri: REDIRECT_URI,
        client_id: CLIENT_ID,
        code_verifier: codeVerifier
      });

      const response = await fetch('https://accounts.spotify.com/api/token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: body
      });
      const data = await response.json();
      return data.access_token;
    }

    async function init() {
      const urlParams = new URLSearchParams(window.location.search);
      let code = urlParams.get('code');

      if (code) {
        window.history.replaceState({}, document.title, window.location.pathname);
        document.getElementById('login-ui').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        
        accessToken = await getToken(code);
        if(accessToken) loadData();
      }
    }

    // Arayüz Sekme Değiştirme Fonksiyonları
    function changeTime(timeRange, element) {
        currentTime = timeRange;
        document.querySelectorAll('#time-tabs .tab').forEach(t => t.classList.remove('active'));
        element.classList.add('active');
        loadData();
    }

    function changeType(type, element) {
        currentType = type;
        document.querySelectorAll('#type-tabs .tab').forEach(t => t.classList.remove('active'));
        element.classList.add('active');
        loadData();
    }

    // Veri Çekme ve Ekrana Basma
    async function loadData() {
        const resultsDiv = document.getElementById('results');
        resultsDiv.innerHTML = '<div class="loading">Veriler Analiz Ediliyor...</div>';

        if (currentType === 'tracks') {
            const data = await fetchSpotifyData(`me/top/tracks?time_range=${currentTime}&limit=20`);
            let html = '';
            data.items.forEach((track, index) => {
                html += `
                <div class="item-card">
                    <div class="item-rank">${index + 1}</div>
                    <div class="item-info">
                        <div class="item-title">${track.name}</div>
                        <div class="item-sub">${track.artists[0].name}</div>
                    </div>
                </div>`;
            });
            resultsDiv.innerHTML = html;
        } 
        else if (currentType === 'artists') {
            const data = await fetchSpotifyData(`me/top/artists?time_range=${currentTime}&limit=20`);
            let html = '';
            data.items.forEach((artist, index) => {
                html += `
                <div class="item-card">
                    <div class="item-rank">${index + 1}</div>
                    <div class="item-info">
                        <div class="item-title">${artist.name}</div>
                        <div class="item-sub">Takipçi: ${artist.followers.total.toLocaleString('tr-TR')}</div>
                    </div>
                </div>`;
            });
            resultsDiv.innerHTML = html;
        }
        else if (currentType === 'genres') {
            // Müzik türleri direkt API'den gelmez, sanatçıların üzerinden hesaplanır
            const data = await fetchSpotifyData(`me/top/artists?time_range=${currentTime}&limit=50`);
            let genreCounts = {};
            
            data.items.forEach(artist => {
                artist.genres.forEach(genre => {
                    genreCounts[genre] = (genreCounts[genre] || 0) + 1;
                });
            });

            // En çok dinlenen türleri sıraya diz
            let sortedGenres = Object.keys(genreCounts).sort((a, b) => genreCounts[b] - genreCounts[a]).slice(0, 15);
            
            let html = '';
            if(sortedGenres.length === 0) html = '<p style="color:#888; text-align:center;">Yeterli veri bulunamadı.</p>';
            
            sortedGenres.forEach((genre, index) => {
                html += `
                <div class="item-card">
                    <div class="item-rank">🏆</div>
                    <div class="item-info">
                        <div class="item-title" style="text-transform: capitalize;">${genre}</div>
                        <div class="item-sub">En çok dinlenen ${index + 1}. müzik tarzın</div>
                    </div>
                </div>`;
            });
            resultsDiv.innerHTML = html;
        }
    }

    async function fetchSpotifyData(endpoint) {
        const res = await fetch(`https://developer.spotify.com/0/${endpoint}`, {
            headers: { 'Authorization': 'Bearer ' + accessToken }
        });
        return await res.json();
    }

    init();
</script>
</body>
</html>

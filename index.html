<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuş Medya | Spotify Özet</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .card { background: #181818; padding: 30px; border-radius: 20px; text-align: center; width: 100%; max-width: 450px; border: 1px solid #333; }
        .btn { background: #1DB954; color: #000; padding: 15px 30px; border-radius: 50px; font-weight: bold; cursor: pointer; border: none; text-decoration: none; display: inline-block; width: 100%; box-sizing: border-box;}
        h1 { margin-bottom: 10px; font-size: 1.5rem; color: #fff; }
        .stat { margin: 15px 0; padding: 15px; background: #282828; border-radius: 10px; text-align: left; border-left: 4px solid #1DB954; display: flex; justify-content: space-between; align-items: center;}
        .stat-left h3 { color: #1DB954; margin: 0 0 5px 0; font-size: 1.1rem; }
        .stat-left span { color: #b3b3b3; font-size: 0.9rem; }
        .stat-right { font-size: 1.3rem; font-weight: bold; color: #fff; }
        #dashboard { display: none; }
        #weekly-stats { max-height: 400px; overflow-y: auto; margin-bottom: 20px; padding-right: 5px; }
        
        /* Kaydırma Çubuğu Tasarımı */
        #weekly-stats::-webkit-scrollbar { width: 6px; }
        #weekly-stats::-webkit-scrollbar-thumb { background: #1DB954; border-radius: 10px; }
    </style>
</head>
<body>

<div class="card" id="login-ui">
    <h1>Spotify Günlük & Haftalık Özet</h1>
    <p style="color: #b3b3b3; margin-bottom: 25px; font-size: 0.9rem;">Kuş Medya Tasarım tarafından geliştirildi.</p>
    <button class="btn" onclick="authorize()">Spotify ile Bağlan</button>
</div>

<div class="card" id="dashboard">
    <h1>Dinleme Geçmişin</h1>
    <p style="color: #b3b3b3; margin-bottom: 20px; font-size: 0.85rem;">(Son 50 şarkı günlere göre ayrılmıştır)</p>
    
    <div id="weekly-stats">
        <p style="color:#888;">Veriler çekiliyor...</p>
    </div>
    
    <button class="btn" onclick="window.location.href=window.location.pathname" style="background:#333; color:white;">Çıkış</button>
</div>

<script>
    // Senin şifren buraya eklendi!
    const CLIENT_ID = '1356e6584dcd4b21a0ec9d22175a035d'; 
    const REDIRECT_URI = window.location.origin + window.location.pathname;

    function generateRandomString(length) {
      let text = '';
      let possible = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
      for (let i = 0; i < length; i++) {
        text += possible.charAt(Math.floor(Math.random() * possible.length));
      }
      return text;
    }

    async function generateCodeChallenge(codeVerifier) {
      const data = new TextEncoder().encode(codeVerifier);
      const digest = await window.crypto.subtle.digest('SHA-256', data);
      return btoa(String.fromCharCode.apply(null, new Uint8Array(digest)))
        .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
    }

    async function authorize() {
      const codeVerifier = generateRandomString(128);
      window.localStorage.setItem('code_verifier', codeVerifier);
      const codeChallenge = await generateCodeChallenge(codeVerifier);
      
      const args = new URLSearchParams({
        response_type: 'code',
        client_id: CLIENT_ID,
        scope: 'user-read-recently-played',
        redirect_uri: REDIRECT_URI,
        code_challenge_method: 'S256',
        code_challenge: codeChallenge
      });
      window.location = 'https://accounts.spotify.com/authorize?' + args;
    }

    async function getToken(code) {
      let codeVerifier = localStorage.getItem('code_verifier');
      const body = new URLSearchParams({
        grant_type: 'authorization_code',
        code: code,
        redirect_uri: REDIRECT_URI,
        client_id: CLIENT_ID,
        code_verifier: codeVerifier
      });

      const response = await fetch('https://accounts.spotify.com/api/token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: body
      });
      const data = await response.json();
      return data.access_token;
    }

    async function init() {
      const urlParams = new URLSearchParams(window.location.search);
      let code = urlParams.get('code');

      if (code) {
        window.history.replaceState({}, document.title, window.location.pathname);
        document.getElementById('login-ui').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        
        const token = await getToken(code);
        if(token) fetchStats(token);
      }
    }

    async function fetchStats(token) {
        const res = await fetch('https://api.spotify.com/v1/me/player/recently-played?limit=50', {
            headers: { 'Authorization': 'Bearer ' + token }
        });
        const data = await res.json();
        
        let dailyStats = {};

        // Şarkıları günlere göre grupla
        data.items.forEach(i => {
            const playedDate = new Date(i.played_at);
            
            // Tarihi Türkçe formatta al (Örn: "27 Haziran Cumartesi")
            const dateStr = playedDate.toLocaleDateString('tr-TR', { weekday: 'long', day: 'numeric', month: 'long' });
            
            if (!dailyStats[dateStr]) {
                dailyStats[dateStr] = { ms: 0, count: 0 };
            }
            dailyStats[dateStr].ms += i.track.duration_ms;
            dailyStats[dateStr].count++;
        });

        // HTML oluştur
        let statsHTML = "";
        for (const [date, stats] of Object.entries(dailyStats)) {
            const minutes = Math.floor(stats.ms / 60000);
            statsHTML += `
            <div class="stat">
                <div class="stat-left">
                    <h3>${date}</h3>
                    <span>${stats.count} Şarkı Dinlendi</span>
                </div>
                <div class="stat-right">
                    ${minutes} Dk
                </div>
            </div>`;
        }
        
        if(statsHTML === "") {
            statsHTML = "<p style='color:#b3b3b3;'>Yakın zamanda dinlenmiş şarkı bulunamadı.</p>";
        }

        document.getElementById('weekly-stats').innerHTML = statsHTML;
    }

    init();
</script>
</body>
</html>

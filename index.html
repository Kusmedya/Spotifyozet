<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuş Medya | Spotify Özet</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #181818; padding: 40px; border-radius: 20px; text-align: center; width: 90%; max-width: 400px; border: 1px solid #333; }
        .btn { background: #1DB954; color: #000; padding: 15px 30px; border-radius: 50px; font-weight: bold; cursor: pointer; border: none; text-decoration: none; display: inline-block; }
        h1 { margin-bottom: 20px; font-size: 1.5rem; }
        .stat { margin: 15px 0; padding: 15px; background: #282828; border-radius: 10px; }
        #dashboard { display: none; }
    </style>
</head>
<body>

<div class="card" id="login-ui">
    <h1>Spotify Günlük Özet</h1>
    <p style="color: #b3b3b3; margin-bottom: 25px;">Kuş Medya Tasarım tarafından geliştirildi.</p>
    <button class="btn" onclick="authorize()">Spotify ile Bağlan</button>
</div>

<div class="card" id="dashboard">
    <h1>Günün Özeti</h1>
    <div class="stat"><h3 style="color:#1DB954">Dakika</h3><span id="min">--</span></div>
    <div class="stat"><h3 style="color:#1DB954">Şarkı Sayısı</h3><span id="songs">--</span></div>
    <div class="stat"><h3 style="color:#1DB954">Favori Parça</h3><span id="track">--</span></div>
    <button class="btn" onclick="window.location.href='/'" style="background:#333; color:white; margin-top:10px;">Çıkış</button>
</div>

<script>
    const CLIENT_ID = 'BURAYA_CLIENT_ID_KODUNU_YAZ'; // Sadece bunu doldur, gerisi otomatik!
    const REDIRECT_URI = window.location.origin + window.location.pathname;

    function authorize() {
        const url = `https://accounts.spotify.com/authorize?client_id=${CLIENT_ID}&response_type=token&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&scope=user-read-recently-played`;
        window.location.href = url;
    }

    async function getStats() {
        const hash = window.location.hash.substring(1);
        const params = new URLSearchParams(hash);
        const token = params.get('access_token');
        if (!token) return;

        document.getElementById('login-ui').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';

        const res = await fetch('https://api.spotify.com/v1/me/player/recently-played?limit=50', {
            headers: { 'Authorization': 'Bearer ' + token }
        });
        const data = await res.json();
        const today = new Date().toISOString().split('T')[0];
        let totalMs = 0, count = 0, songs = {};

        data.items.forEach(i => {
            if (i.played_at.startsWith(today)) {
                totalMs += i.track.duration_ms;
                count++;
                songs[i.track.name] = (songs[i.track.name] || 0) + 1;
            }
        });

        document.getElementById('min').innerText = Math.floor(totalMs / 60000) + ' Dakika';
        document.getElementById('songs').innerText = count + ' Şarkı';
        document.getElementById('track').innerText = Object.keys(songs).reduce((a, b) => songs[a] > songs[b] ? a : b);
    }

    getStats();
</script>
</body>
</html>
